    <meta charset="UTF-8">

    <title>Alternating 8x24 Grid Layout (48 Total Rows)</title>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, minmax(130px, 1fr));
            gap: 4px 8px;
            padding: 15px;
            max-width: 1600px;
            margin: 0 auto;
            font-family: sans-serif;
            align-items: center;
        }
        .grid-container input {
            width: 100%;
            height: 36px;
            padding: 6px;
            box-sizing: border-box;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .button-group-row {
            display: flex;
            gap: 4px;
            width: 100%;
            height: 24px;
            box-sizing: border-box;
        }
        .button-group-row button {
            flex: 1;
            height: 100%;
            padding: 0;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .button-group-row button:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
        input:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 4px rgba(0,123,255,0.25);
        }
    </style>
</head>
