<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternating 8x24 Grid Layout (48 Total Rows)</title>
    <style>
        .grid-container {
            display: grid;
            /* Exactly 8 equal-width horizontal columns */
            grid-template-columns: repeat(8, minmax(130px, 1fr));
            gap: 4px 8px; /* Compact layout spacing */
            padding: 15px;
            max-width: 1600px;
            margin: 0 auto;
            font-family: sans-serif;
            align-items: center;
        }

        /* Input field styling (for odd rows) */
        .grid-container input {
            width: 100%;
            height: 36px;
            padding: 6px;
            box-sizing: border-box;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Button row block layout (for even rows) */
        .button-group-row {
            display: flex;
            gap: 4px;
            width: 100%;
            height: 24px;
            box-sizing: border-box;
        }

        .button-group-row button {
            flex: 1; /* Stretches buttons evenly to fill column width */
            height: 100%;
            padding: 0;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .button-group-row button:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        /* Border change on text box focus */
        input:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 4px rgba(0,123,255,0.25);
        }

        /* Visual styling to clearly group an input row with its button row below it */
        .grid-container > input:nth-child(16n+1), 
        .grid-container > input:nth-child(16n+2),
        .grid-container > input:nth-child(16n+3),
        .grid-container > input:nth-child(16n+4),
        .grid-container > input:nth-child(16n+5),
        .grid-container > input:nth-child(16n+6),
        .grid-container > input:nth-child(16n+7),
        .grid-container > input:nth-child(16n+8) {
            background-color: #fdfdfd;
        }
    </style>
</head>
